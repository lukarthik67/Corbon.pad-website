<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarbonPad</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-strong: #f8fafc;
      --border: #dfe5ee;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-soft: #eff6ff;
      --danger: #dc2626;
      --success: #15803d;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    button, input, textarea {
      font: inherit;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: min(100%, 480px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      color: white;
      font-weight: 700;
      font-size: 18px;
      flex-shrink: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .form {
      display: grid;
      gap: 12px;
    }

    label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
    }

    input, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      background: var(--panel-strong);
      color: var(--text);
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 11px 15px;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-secondary {
      background: var(--panel-strong);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .hint {
      font-size: 0.84rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .message {
      min-height: 1.2em;
      font-size: 0.92rem;
      color: var(--danger);
      margin-top: 2px;
    }

    .message.success { color: var(--success); }

    .pad-shell {
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .topbar .meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .topbar .meta strong {
      font-size: 0.96rem;
      overflow-wrap: anywhere;
    }

    .topbar .meta span {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .topbar .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 0;
    }

    .editor-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    textarea {
      flex: 1;
      min-height: 360px;
      border: 0;
      border-radius: 0;
      background: var(--panel);
      padding: 18px 18px 24px;
      resize: none;
      line-height: 1.6;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.85rem;
      background: var(--panel-strong);
    }

    @media (max-width: 640px) {
      .card, .topbar, .editor-wrap { border-radius: 16px; }
      .pad-shell { padding: 12px; }
      .topbar { flex-direction: column; align-items: flex-start; }
      .topbar .actions { width: 100%; }
      .topbar .actions button { flex: 1; }
    }
  </style>
</head>
<body>
  <div id="homeView" class="shell">
    <div class="card">
      <div class="brand">
        <div class="brand-mark">C</div>
        <div>
          <h1>CarbonPad</h1>
          <p>Quick, private notes with safe pad IDs.</p>
        </div>
      </div>

      <form id="openForm" class="form">
        <label for="padNameInput">Pad ID</label>
        <input id="padNameInput" name="padId" type="text" placeholder="my-notes" autocomplete="off" spellcheck="false" required>

        <label for="passwordInput">Password (optional)</label>
        <input id="passwordInput" name="password" type="password" placeholder="Leave blank for a public pad" autocomplete="off">

        <div class="actions">
          <button class="btn-primary" id="openBtn" type="submit">Open Pad</button>
          <button class="btn-secondary" id="randomIdBtn" type="button">Use random ID</button>
        </div>

        <div class="hint">New pads are created only when the ID is unused. Existing pads open safely and will never be overwritten.</div>
        <div id="message" class="message" aria-live="polite"></div>
      </form>
    </div>
  </div>

  <div id="padView" class="pad-shell" hidden>
    <div class="topbar">
      <div class="meta">
        <strong id="padNameLabel"></strong>
        <span id="statusText">Loading…</span>
      </div>
      <div class="actions">
        <button class="btn-secondary" id="backBtn" type="button">Back</button>
        <button class="btn-secondary" id="protectBtn" type="button">Protect</button>
      </div>
    </div>

    <div class="editor-wrap">
      <textarea id="editor" placeholder="Start typing…" spellcheck="false"></textarea>
      <div class="footer">
        <span id="footerHint">Saved locally through the backend API.</span>
        <span id="saveState">Ready</span>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const homeView = document.getElementById('homeView');
      const padView = document.getElementById('padView');
      const form = document.getElementById('openForm');
      const padNameInput = document.getElementById('padNameInput');
      const passwordInput = document.getElementById('passwordInput');
      const openBtn = document.getElementById('openBtn');
      const randomIdBtn = document.getElementById('randomIdBtn');
      const message = document.getElementById('message');
      const padNameLabel = document.getElementById('padNameLabel');
      const statusText = document.getElementById('statusText');
      const editor = document.getElementById('editor');
      const saveState = document.getElementById('saveState');
      const backBtn = document.getElementById('backBtn');
      const protectBtn = document.getElementById('protectBtn');
      const footerHint = document.getElementById('footerHint');

      const apiBase = '/api/pads';
      const state = {
        padId: null,
        token: null,
        protected: false,
        content: '',
        dirty: false,
        saveTimer: null,
      };

      function setMessage(text, type) {
        message.textContent = text || '';
        message.className = 'message' + (type ? ' ' + type : '');
      }

      function setStatus(text) {
        statusText.textContent = text || 'Ready';
      }

      function setSaveState(text) {
        saveState.textContent = text || 'Ready';
      }

      function sanitizePadId(raw) {
        const value = (raw || '').trim();
        if (!value) return '';
        const sanitized = value.replace(/\s+/g, '-').replace(/[^a-zA-Z0-9\-_.]/g, '');
        return sanitized;
      }

      function generatePadId() {
        return 'pad-' + Math.random().toString(36).slice(2, 10);
      }

      function renderView() {
        if (state.padId) {
          homeView.hidden = true;
          padView.hidden = false;
          padNameLabel.textContent = state.padId;
          footerHint.textContent = state.protected ? 'Protected with a password.' : 'Public pad';
        } else {
          homeView.hidden = false;
          padView.hidden = true;
        }
      }

      function getRoutePadId() {
        const hash = location.hash.replace(/^#\//, '');
        return hash ? decodeURIComponent(hash) : '';
      }

      function setRoutePadId(padId) {
        if (padId) {
          location.hash = '#/' + encodeURIComponent(padId);
        } else {
          location.hash = '';
        }
      }

      function resetEditor() {
        editor.value = '';
        state.content = '';
        state.dirty = false;
        state.token = null;
      }

      async function requestJson(path, options = {}) {
        const response = await fetch(path, options);
        let payload = null;
        try {
          payload = await response.json();
        } catch (error) {
          payload = null;
        }
        if (!response.ok) {
          const messageText = payload && payload.error ? payload.error : 'Request failed.';
          throw new Error(messageText);
        }
        return payload;
      }

      async function openPad(padId, password, options = {}) {
        const id = sanitizePadId(padId);
        if (!id) {
          setMessage('Please enter a Pad ID.', 'error');
          return;
        }

        setMessage('', '');
        setStatus('Checking pad…');
        setSaveState('Working');
        openBtn.disabled = true;
        randomIdBtn.disabled = true;

        try {
          const existing = await requestJson(`${apiBase}/${encodeURIComponent(id)}`);

          if (!existing.exists) {
            if (password) {
              const lockData = await requestJson(`${apiBase}/${encodeURIComponent(id)}/lock`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
              });
              state.token = lockData.token || null;
              state.protected = true;
            } else {
              await requestJson(`${apiBase}/${encodeURIComponent(id)}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: '' })
              });
              state.token = null;
              state.protected = false;
            }

            state.padId = id;
            state.content = '';
            resetEditor();
            editor.disabled = false;
            setStatus('New pad ready');
            setSaveState('Ready');
            setMessage('Created a new pad with a unique ID.', 'success');
            renderView();
            setRoutePadId(id);
            return;
          }

          if (existing.hasPassword) {
            if (!password) {
              throw new Error('That pad is protected. Enter the correct password to open it.');
            }
            const unlockData = await requestJson(`${apiBase}/${encodeURIComponent(id)}/unlock`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ password })
            });
            state.token = unlockData.token || null;
            state.protected = true;
            state.content = unlockData.content || '';
          } else {
            state.token = null;
            state.protected = false;
            state.content = existing.content || '';
          }

          state.padId = id;
          editor.value = state.content;
          editor.disabled = false;
          setStatus(existing.hasPassword ? 'Opened securely' : 'Opened');
          setSaveState('Ready');
          setMessage('', '');
          renderView();
          setRoutePadId(id);
        } catch (error) {
          setStatus('Unable to open pad');
          setSaveState('Error');
          setMessage(error.message || 'Unable to open pad.', 'error');
          state.padId = null;
          state.token = null;
          renderView();
          setRoutePadId('');
        } finally {
          openBtn.disabled = false;
          randomIdBtn.disabled = false;
        }
      }

      async function saveContent() {
        if (!state.padId) return;
        const content = editor.value;
        if (typeof content !== 'string' || content.length > 262144) {
          setSaveState('Too large');
          return;
        }

        try {
          const headers = { 'Content-Type': 'application/json' };
          if (state.token) {
            headers.Authorization = `Bearer ${state.token}`;
          }

          await requestJson(`${apiBase}/${encodeURIComponent(state.padId)}`, {
            method: 'PUT',
            headers,
            body: JSON.stringify({ content })
          });
          state.content = content;
          state.dirty = false;
          setSaveState('Saved');
        } catch (error) {
          setSaveState('Save failed');
          setMessage(error.message || 'Could not save.', 'error');
        }
      }

      function scheduleSave() {
        if (!state.padId) return;
        state.dirty = true;
        setSaveState('Saving…');
        clearTimeout(state.saveTimer);
        state.saveTimer = setTimeout(saveContent, 700);
      }

      editor.addEventListener('input', scheduleSave);

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        openPad(padNameInput.value, passwordInput.value);
      });

      randomIdBtn.addEventListener('click', () => {
        const generated = generatePadId();
        padNameInput.value = generated;
        passwordInput.value = '';
        setMessage('Generated a fresh Pad ID. You can open it now.', 'success');
      });

      backBtn.addEventListener('click', () => {
        state.padId = null;
        state.token = null;
        state.protected = false;
        state.content = '';
        clearTimeout(state.saveTimer);
        setMessage('', '');
        setSaveState('Ready');
        renderView();
        setRoutePadId('');
      });

      protectBtn.addEventListener('click', async () => {
        if (!state.padId) return;
        const password = window.prompt('Set a password for this pad (leave blank to remove protection):');
        if (password === null) return;

        try {
          const headers = { 'Content-Type': 'application/json' };
          if (state.token) {
            headers.Authorization = `Bearer ${state.token}`;
          }

          if (!password) {
            await requestJson(`${apiBase}/${encodeURIComponent(state.padId)}/lock`, {
              method: 'DELETE',
              headers
            });
            state.protected = false;
            state.token = null;
            setMessage('Password removed.', 'success');
          } else {
            const lockData = await requestJson(`${apiBase}/${encodeURIComponent(state.padId)}/lock`, {
              method: 'POST',
              headers,
              body: JSON.stringify({ password })
            });
            state.token = lockData.token || null;
            state.protected = true;
            setMessage('Password saved.', 'success');
          }
          setStatus(state.protected ? 'Protected' : 'Unprotected');
          renderView();
        } catch (error) {
          setMessage(error.message || 'Could not update password.', 'error');
        }
      });

      window.addEventListener('hashchange', () => {
        const routeId = getRoutePadId();
        if (routeId && routeId !== state.padId) {
          openPad(routeId, '');
        }
      });

      const initialRoute = getRoutePadId();
      if (initialRoute) {
        openPad(initialRoute, '');
      } else {
        renderView();
      }
    })();
  </script>
</body>
</html>
